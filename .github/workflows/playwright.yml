name: Playwright Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      # The application under test lives in a separate repository. If that repo is
      # private, add a PAT with read access as the APP_REPO_TOKEN secret.
      - name: Checkout application under test
        uses: actions/checkout@v4
        with:
          repository: NickBaynham/hospital-admin
          path: hospital-admin
          token: ${{ secrets.APP_REPO_TOKEN || github.token }}

      - name: Start application stack (Docker Compose)
        working-directory: hospital-admin
        run: docker compose up --build -d

      - name: Wait for API and frontend to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is up"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:8000/health || (echo "API did not start" && exit 1)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173/ > /dev/null; then
              echo "Frontend is up"; break
            fi
            sleep 2
          done
          curl -sf http://localhost:5173/ > /dev/null || (echo "Frontend did not start" && exit 1)

      - name: Record build under test
        run: |
          echo "APP_GIT_SHA=$(git -C hospital-admin rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "APP_BACKEND_IMAGE=$(docker inspect --format '{{.Id}}' hospital-admin-backend)" >> "$GITHUB_ENV"
          echo "APP_FRONTEND_IMAGE=$(docker inspect --format '{{.Id}}' hospital-admin-frontend)" >> "$GITHUB_ENV"
          # GITHUB_RUN_ID is already exported by the runner and recorded as ciBuildId.

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Blocking gate: functional API + UI tests must pass.
      - name: Run functional tests (API + UI)
        run: npm run test:ci

      # Non-blocking watch: known-defect regression tests are red by design until the
      # app is fixed. They are surfaced here without failing the build.
      - name: Run regression watch (known defects, non-blocking)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: npm run test:regression

      - name: Show application logs on failure
        if: ${{ failure() }}
        working-directory: hospital-admin
        run: docker compose logs --no-color

      - name: Stop application stack
        if: ${{ always() }}
        working-directory: hospital-admin
        run: docker compose down -v

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
